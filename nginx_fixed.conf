upstream backend_mobile {
    server 127.0.0.1:8090;
}

upstream backend_web {
    server 127.0.0.1:5000;
}

# Map User-Agent to the correct backend
map $http_user_agent $backend_pool {
    default backend_web;
    "~*okhttp" backend_mobile;    # Standard Android networking
    "~*Dalvik" backend_mobile;    # Android System
    "~*Exponent" backend_mobile;  # Expo / React Native
    "~*CFNetwork" backend_mobile; # iOS networking
}

upstream geoserver {
    server 117.251.19.107:8080;
}

upstream mapserver {
    server 117.251.19.107:8000;
}

upstream dashboard {
    server 117.251.19.107:8001;
}

server {
    listen 80;
    server_name 117.251.19.107;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;

    # Explicitly route mobile-specific auth endpoints to mobile backend
    location /api/users/registration-requests {
        proxy_pass http://backend_mobile;
    }

    location /api/users/login {
        proxy_pass http://backend_mobile;
    }

    # API proxy to backend (User-Agent based routing for other endpoints)
    location /api {
        proxy_pass http://$backend_pool;
    }

    # GeoServer proxy
    location /geoserver {
        proxy_pass http://geoserver;
    }

    # Map tiles proxy
    location /tiles {
        proxy_pass http://mapserver;
    }

    location /satellite {
        proxy_pass http://mapserver;
    }

    # AiaeroConnectDashboard proxy
    location /dashboard {
        proxy_pass http://dashboard;
    }
}
